openapi: 3.0.3
info:
  title: RetroVault API
  version: 1.0.0
servers:
  - url: http://localhost:8000
paths:
  /api/auth/token/:
    post:
      summary: Obtain JWT token pair
      responses:
        "200": { description: Token pair returned }
        "401": { description: Invalid credentials }
  /api/auth/token/refresh/:
    post:
      summary: Refresh access token
      responses:
        "200": { description: Token refreshed }
        "401": { description: Invalid refresh token }
  /api/platforms/:
    get:
      summary: List platforms
      responses:
        "200": { description: OK }
    post:
      summary: Create platform
      responses:
        "201": { description: Created }
        "400": { description: Validation error }
        "403": { description: Forbidden }
  /api/genres/:
    get:
      summary: List genres
      responses:
        "200": { description: OK }
    post:
      summary: Create genre
      responses:
        "201": { description: Created }
        "400": { description: Validation error }
        "403": { description: Forbidden }
  /api/games/:
    get:
      summary: List games
      responses:
        "200": { description: OK }
    post:
      summary: Create game
      responses:
        "201": { description: Created }
        "400": { description: Validation error }
        "401": { description: Unauthorized }
  /api/games/{id}/:
    get:
      summary: Retrieve game
      responses:
        "200": { description: OK }
        "404": { description: Not found }
    patch:
      summary: Update game
      responses:
        "200": { description: Updated }
        "400": { description: Validation error }
        "403": { description: Forbidden }
  /api/carts/:
    get:
      summary: List carts
      responses:
        "200": { description: OK }
        "401": { description: Unauthorized }
  /api/carts/{id}/:
    get:
      summary: Retrieve cart with items
      responses:
        "200": { description: OK }
        "401": { description: Unauthorized }
        "404": { description: Not found }
  /api/orders/:
    get:
      summary: List orders
      responses:
        "200": { description: OK }
        "401": { description: Unauthorized }
    post:
      summary: Create order
      responses:
        "201": { description: Created }
        "400": { description: Validation error }
        "401": { description: Unauthorized }
  /api/orders/{id}/:
    get:
      summary: Retrieve order
      responses:
        "200": { description: OK }
        "401": { description: Unauthorized }
        "404": { description: Not found }
